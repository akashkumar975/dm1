name: generated ASCII Artwork

on: 
    push

jobs: 
  build_job_1:
    runs-on: ubuntu-latest
    steps: 
      - name: intall cowsay program
        run: sudo apt-get install cowsay -y
      - name: execute cowsay CMD
        run: cowsay -f dragon "Run for cover, I am a Dragon....RAWR" >> dragon.txt

      - name: pwd
        run: | 
              pwd
              ls -ltr
      - name: upload dragon text file 
        uses: actions/upload-artifact@v4
        with: 
          name:  my-artifact
          path: /home/runner/work/dm1/dm1/dragon.txt

  build_job_2:
    runs-on: ubuntu-latest  
    needs: build_job_1
    steps: 
      - name: sleep for 10 sec
        run: sleep 10 

      - name: test file exists 
        run: grep -i "dragon" dragon.txt
      - name: download artifact 
        uses: actions/download-artifact@v4
        with: 
            name: my-artifact

  build_job_3: 
    needs: ["build_job_1","build_job_2"]
    runs-on: ubuntu-latest
    steps: 
      - name: Read file 
        run: cat dragon.txt 
      - name: downlaod artificatc
        uses: actions/download-artifact@v4
        with: 
            name: my-artifact

      - name: Deploy 
        run: echo deployeiinnn......
